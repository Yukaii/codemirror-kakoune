name: Kakoune Fixture PoC

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Kakoune fixture PoC tests
        run: pnpm test -- --runInBand test/poc/kakoune-fixtures.test.ts test/poc/run-kakoune-fixture.test.ts test/poc/kakoune-parity.test.ts
