<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeMirror Kakoune Playground</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <header class="bar">
        <span class="brand">codemirror-kakoune</span>
        <div class="controls">
          <label class="control" for="theme-select">
            <span>theme</span>
            <select id="theme-select" name="theme">
              <option value="night">Night</option>
              <option value="paper">Paper</option>
              <option value="sepia">Sepia</option>
            </select>
          </label>
          <span class="state">
            mode: <strong id="mode-pill">normal</strong>
            register: <code id="register-pill">""</code>
          </span>
        </div>
      </header>

      <div id="editor"></div>

      <p class="hint">
        i insert · o/O open line · s select · S regex · Esc normal · h j k l move · gh/gl line · gk/gj top/bottom · H/L char ·
        J/K/W/B/E extend · G+hjkl extend · GG end · f/t/F/T find · * search · n/N next · % buffer · , clear · ; cursor · ( ) rotate
      </p>
    </main>
  </body>
</html>
