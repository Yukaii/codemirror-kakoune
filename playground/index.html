<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeMirror Kakoune Playground</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <header class="bar">
        <div class="brand-container">
          <span class="brand">codemirror-kakoune</span>
          <a href="https://github.com/Yukaii/codemirror-kakoune" class="github-link" target="_blank" rel="noopener noreferrer" aria-label="GitHub Repository">
            <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
          </a>
        </div>
        <div class="controls">
          <label class="control" for="theme-select">
            <span>theme</span>
            <select id="theme-select" name="theme">
              <option value="night">Night</option>
              <option value="paper">Paper</option>
              <option value="sepia">Sepia</option>
            </select>
          </label>
          <label class="control" for="layout-select">
            <span>which-key</span>
            <select id="layout-select" name="layout">
              <option value="vertical">Vertical</option>
              <option value="horizontal">Horizontal</option>
            </select>
          </label>
          <span class="state">
            mode: <strong id="mode-pill">select</strong>
            search: <code id="search-pill">select:</code>
            <span class="register-container">
              register: <button id="register-pill" class="pill-button" title="View active register contents">""</button>
              <div id="register-popover" class="register-popover">
                <div class="popover-header">
                  <span>Register Content</span>
                  <button id="popover-close" type="button">×</button>
                </div>
                <pre id="register-content">""</pre>
              </div>
            </span>
          </span>
        </div>
      </header>

      <div id="editor">
        <div id="which-key-hud" class="hidden">
          <div class="hud-header">
            <span id="hud-title" class="hud-title">which-key</span>
            <span id="hud-prompt" class="hud-prompt hidden">waiting for char...</span>
          </div>
          <div id="hud-items" class="hud-items"></div>
        </div>
      </div>
    </main>
  </body>
</html>
