<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeMirror Kakoune Playground</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <header class="bar">
        <a href="https://github.com/Yukaii/codemirror-kakoune" class="brand" target="_blank" rel="noopener noreferrer">codemirror-kakoune</a>
        <div class="controls">
          <label class="control" for="theme-select">
            <span>theme</span>
            <select id="theme-select" name="theme">
              <option value="night">Night</option>
              <option value="paper">Paper</option>
              <option value="sepia">Sepia</option>
            </select>
          </label>
          <span class="state">
            mode: <strong id="mode-pill">select</strong>
            search: <code id="search-pill">select:</code>
            register: <code id="register-pill">""</code>
          </span>
        </div>
      </header>

      <div id="editor"></div>
    </main>
  </body>
</html>
