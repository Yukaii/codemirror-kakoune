<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeMirror Kakoune Playground</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <header class="bar">
        <span>codemirror-kakoune</span>
        <span class="state">
          mode: <strong id="mode-pill">normal</strong>
          register: <code id="register-pill">""</code>
        </span>
      </header>

      <div id="editor"></div>

      <p class="hint">
        i insert · Esc normal · h j k l move · w b e words · f/t/F/T find · * search · n/N next ·
        % buffer · , clear · ; cursor · ( ) rotate
      </p>
    </main>
  </body>
</html>
